[project]
name = "spack-repo-builtin"
description = "The builtin repository of the Spack package manager"
requires-python = ">=3.6"
version = "2026.5.0.dev0"  # note: leading zeros are normalized away, so use single digit months.

[project.optional-dependencies]
dev = [
  "pip>=21.3",
  "pytest",
  "pytest-xdist",
  "mypy",
  "ruff",
  "vermin",
]
ci = ["pytest-cov", "codecov[toml]"]

[tool.ruff]
line-length = 99

