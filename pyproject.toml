[tool.ruff.format]
line-ending = "lf"
skip-magic-trailing-comma = false

[tool.ruff.lint]
extend-select = ["E", "I", "W"]
ignore = ["E731", "F403", "F811"]

[tool.ruff.lint.isort]
split-on-trailing-comma = false
section-order = [
  "future",
  "standard-library",
  "third-party",
  "spack",
  "first-party",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
spack = ["spack"]

[tool.mypy]
files = [
  "repos/spack_repo/builtin/packages/*/package.py",
  "repos/spack_repo/builtin/build_systems/*.py",
]
mypy_path = ["repos/", "spack-core/lib/spack"]
explicit_package_bases = true
allow_redefinition = true
namespace_packages = true
disable_error_code = ["no-redef", "name-defined", "attr-defined"]

[[tool.mypy.overrides]]
module = "spack.*"
ignore_errors = true


[tool.coverage.run]
parallel = true
concurrency = ["multiprocessing"]
branch = true
source = ["bin", "lib"]
data_file = "./tests-coverage/.coverage"


[tool.coverage.report]
# Regexes for lines to exclude from consideration
exclude_lines = [
  # Have to re-enable the standard pragma
  "pragma: no cover",

  # Don't complain about missing debug-only code:
  "def __repr__",
  "if self\\.debug",

  # Don't complain if tests don't hit defensive assertion code:
  "raise AssertionError",
  "raise NotImplementedError",

  # Don't complain if non-runnable code isn't run:
  "if 0:",
  "if False:",
  "if __name__ == .__main__.:",
]
ignore_errors = true

[tool.coverage.paths]
source = [
  ".",
  "/Users/runner/work/spack/spack",
  "/System/Volumes/Data/home/runner/work/spack/spack",
  "D:\\a\\spack\\spack",
]

[tool.coverage.html]
directory = "htmlcov"
