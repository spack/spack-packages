name: prechecks

on:
  workflow_call:
    inputs:
      with_packages:
        required: true
        type: string

concurrency:
  group: prechecks-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true


jobs:
  # Ensure no changes involve the old builtin repository directory
  check-builtin-dir:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 2
    - name: Check changed files
      run: |
        commits="$(git rev-list --all)"
        readarray -t <<< $commits
        changed_files=$(git diff --name-only --diff-filter=d ${MAPFILE[-1]}..${MAPFILE[0]})
        OLD_BUILTIN="var/spack/repos/spack_repo/builtin"
        NEW_BUILTIN="repos/spack_repo/builtin"
        if echo "$changed_files" | grep -q "$OLD_BUILTIN"; then
          echo "Error: Packages are not allowed in '$OLD_BUILTIN'."
          echo "       Use '$NEW_BUILTIN' instead."
          exit 1
        else
          echo "Info: '$OLD_BUILTIN' is not being used"
        fi

  # Validate that the code can be run on all the Python versions supported by Spack
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.13'
    - name: Install Python Packages
      run: |
        pip install -r .github/workflows/requirements/style/requirements.txt
    - name: vermin (Repositories)
      run: |
        vermin --backport importlib --backport argparse --violations --backport typing -t=3.6- -vvv repos tests

  # Run style checks on the files that have been changed
  style:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 2
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.13'
    - name: Install Python packages
      run: |
        pip install -r .github/workflows/requirements/style/requirements.txt
    - uses: ./.github/actions/checkout-spack
      with:
        # This path must match the path in pyprojects.toml
        path: spack-core
    - name: Run style tests
      run: .ci/style_check.sh HEAD^
    # todo: license check
    # todo: mypy

  audit:
    uses: ./.github/workflows/audit.yaml
    secrets: inherit
    with:
      python_version: '3.13'

  verify-checksums:
    # do not run if the commit message or PR description contains [skip-verify-checksums]
    if: >-
      ${{ inputs.with_packages == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        # Depth 2 is required for this check
        fetch-depth: 2
    - uses: ./.github/actions/checkout-spack
      with:
        fetch-depth: 1
    - name: Verify Added Checksums
      run: |
        . spack-core/share/spack/setup-env.sh
        spack ci verify-versions HEAD~1 HEAD
