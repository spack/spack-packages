name: ci

on:
  push:
    branches:
      - develop
      - releases/**
  pull_request:
    branches:
      - develop
      - releases/**
  merge_group:

concurrency:
  group: ci-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

jobs:
  # Check which files have been updated by the PR
  changes:
    runs-on: ubuntu-latest
    # Set job outputs to values from filter step
    outputs:
      core: ${{ steps.filter.outputs.core }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        if: ${{ github.event_name == 'push' || github.event_name == 'merge_group' }}
        with:
          fetch-depth: 0
            # For pull requests it's not necessary to checkout the code
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          # For merge group events, compare against the target branch (main)
          base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || '' }}
          # For merge group events, use the merge group head ref
          ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.ref }}
          # See https://github.com/dorny/paths-filter/issues/56 for the syntax used below
          # Don't run if we only modified packages in the
          # built-in repository or documentation
          filters: |
            core:
            - .ci/env
            packages:
            - repos/spack_repo/**
            old-builtin:
            - 'var/spack/repos/spack_repo/builtin/**'
      - name: Detected old builtin repository
        if: steps.filter.outputs.old-builtin == 'true'
        run: |
          echo "Error: Packages are not allowed in 'var/spack/repos/spack_repo/builtin'."
          echo "       Use 'repos/spack_repo/builtin' instead."
          exit 1

  unit-tests:
    # if: ${{ github.repository == 'spack/spack' && needs.changes.outputs.core == 'true' }}
    needs: [ prechecks, changes ]
    uses: ./.github/workflows/unit_tests.yaml
    secrets: inherit

  prechecks:
    needs: [ changes ]
    uses: ./.github/workflows/prechecks.yml
    secrets: inherit
    with:
      with_packages: ${{ needs.changes.outputs.packages }}

  all-prechecks:
    needs: [ prechecks ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Success
      run: |
        if [ "${{ needs.prechecks.result }}" == "failure" ] || [ "${{ needs.prechecks.result }}" == "canceled" ]; then
          echo "GHA checks failed."
          exit 1
        else
          exit 0
        fi

  all:
    needs: [ unit-tests ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#needs-context
    steps:
    - name: Status summary
      run: |
        if [ "${{ needs.unit-tests.result }}" == "failure" ] || [ "${{ needs.unit-tests.result }}" == "canceled" ]; then
          echo "Unit tests failed."
          exit 1
        else
          exit 0
        fi
