spack:
  view: false
  definitions:
  - apps:
    - gromacs %oneapi
    - lammps %oneapi
        # earliest oneapi version with fix does not run on AmazonLinux2, see https://github.com/spack/spack/pull/46457
        # - mpas-model %oneapi
    - openfoam %gcc
    - palace %oneapi
        # TODO: Find out how to make +ipo cmake flag work.
        # - quantum-espresso %oneapi
    - openmpi %oneapi
    - wrf %oneapi
  - targets:
    - target=x86_64_v4
    - target=x86_64_v3
  specs:
  - matrix:
    - [$apps]
    - [$targets]
  ci:
    pipeline-gen:
    - build-job:
        image: {name: ghcr.io/spack/pcluster-amazonlinux-2:pr-66, entrypoint: ['']}
        before_script:
        - - mkdir spack
          - cd spack
          - git init
          - git remote add origin https://github.com/spack/spack.git
          - git fetch --depth 1 origin ${SPACK_CHECKOUT_VERSION}
          - git checkout FETCH_HEAD
          - cd ..
        - - . "./spack/share/spack/setup-env.sh"
          - . /etc/profile.d/modules.sh
          - spack --version
          - spack arch
          - spack mirror add --signed boot /bootstrap-gcc-cache/
          - spack buildcache keys --install --trust --force
          - spack -c "config:install_tree:root:/home/software/spack/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeholder__/__spack_path_placeh" reindex
          - spack install --use-buildcache package:only gcc@12
          - spack install --use-buildcache package:only intel-oneapi-compilers@2024.1.0 target=x86_64_v3
    - signing-job:
        before_script:
            # Do not distribute Intel & ARM binaries
        - - export SPECS_PATH=${SPACK_BUILDCACHE_RELATIVE_SPECS_PATH}
          - for i in $(aws s3 ls --recursive ${SPACK_REMOTE_MIRROR_OVERRIDE}/${SPECS_PATH}/ | grep intel-oneapi | awk '{print $4}' | sed -e "s?^.*${SPECS_PATH}/??g"); do aws s3 rm ${SPACK_REMOTE_MIRROR_OVERRIDE}/${SPECS_PATH}/$i; done
          - for i in $(aws s3 ls --recursive ${SPACK_REMOTE_MIRROR_OVERRIDE}/${SPECS_PATH}/ | grep armpl | awk '{print $4}' | sed -e "s?^.*${SPECS_PATH}/??g"); do aws s3 rm ${SPACK_REMOTE_MIRROR_OVERRIDE}/${SPECS_PATH}/$i; done
  cdash:
    build-group: AWS Packages

  config:
    shared_linking:
      missing_library_policy: ignore  # due to use of externals

  packages:
    gettext:
      # Newer gettext cannot build with gcc@12 and old AL2 glibc headers
      # Older gettext versions do not build correctly with oneapi.
      require:
      - one_of: ['@:0.20 %gcc', '%oneapi']
    gromacs:
      require:
      - +intel_provided_gcc ^intel-oneapi-mkl
    intel-oneapi-mpi:
      variants: +external-libfabric generic-names=True
    lammps:
      require:
      - lammps_sizes=bigbig +molecule +kspace +rigid +asphere +opt +openmp +openmp-package fft=mkl ^intel-oneapi-mkl
      - one_of: [+intel target=x86_64_v4, target=x86_64_v3]
    bison:
      require:
      - "%gcc"
    boost:
      require:
      - "%gcc"
    libfabric:
      buildable: true
      externals:
      - prefix: /opt/amazon/efa/
        spec: libfabric@1.17.0
      require:
      - fabrics=shm,efa
    mpas-model:
      require:
      - spec: precision=single ^parallelio+pnetcdf
        when: '%oneapi'
    mpich:
      require:
      - mpich pmi=pmi2 device=ch4 netmod=ofi +slurm
    openmpi:
      variants: ~atomics ~cuda ~cxx ~cxx_exceptions ~internal-hwloc ~java +legacylaunchers ~lustre ~memchecker +pmi +romio ~singularity +vt +wrapper-rpath fabrics=ofi schedulers=slurm
      require:
      - 'openmpi @4:'
    palace:
      require:
      - palace ^fmt@9.1.0
    pmix:
      require:
      - 'pmix@3:'
    quantum-espresso:
      require:
      - quantum-espresso@6.6 ^intel-oneapi-mkl+cluster
    slurm:
      buildable: false
      externals:
      - prefix: /opt/slurm
        spec: slurm@22.05.8 +pmix
      require:
      - +pmix
    wrf:
      require:
      - wrf@4 build_type=dm+sm
    all:
      permissions:
        read: world
        write: user
      providers:
        c: [intel-oneapi-compilers, gcc]
        cxx: [intel-oneapi-compilers, gcc]
        fortran: [intel-oneapi-compilers, gcc]
        blas: [intel-oneapi-mkl]
        daal: [intel-oneapi-dal]
        fftw-api: [intel-oneapi-mkl]
        ipp: [intel-oneapi-ipp]
        lapack: [intel-oneapi-mkl]
        mkl: [intel-oneapi-mkl]
        mpi: [intel-oneapi-mpi, openmpi, mpich]
        tbb: [intel-oneapi-tbb, intel-tbb]
        scalapack: [intel-oneapi-mkl]
