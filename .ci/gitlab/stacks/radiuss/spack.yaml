spack:
  view: false

  include:
  - $CI_PROJECT_DIR/.ci/gitlab/

  packages:
    all:
      target: [ "x86_64_v3" ]
      require:
      - target=x86_64_v3
      - ~cuda
      - ~rocm
      - spec: ^mvapich2
        when: '^mpi'
      prefer:
        - "%gcc"
      providers:
        mpi: [mvapich2]
  
  concretizer:
    unify: false
    reuse: false

  specs:
  - ascent  # ^conduit@0.6.0
  - axom
  - blt
  - caliper
  - care  # ~benchmarks ~examples ~tests
  - chai  # ~examples
  - conduit  # ^hdf5+shared
  - flux-core
  # - flux-sched
  - hypre
  - lbann
  - lvarray ~tests  # per Spack issue #23192  # ~examples
  # - mfem  # does not work with gcc 7
  - py-hatchet
  - py-maestrowf
  - py-merlin
  - py-shroud
  - raja # ~examples  # ~tests
  - raja-perf
  - samrai
  - scr
  - sundials
  - umpire # ~openmp
  # - visit   # ^mesa-glu@9.0.0
  - xbraid
  - zfp

  ci:
    pipeline-gen:
    - build-job:
        image: ghcr.io/spack/x86_64_v3-linux-gnu:2024-12-12

  cdash:
    build-group: RADIUSS
