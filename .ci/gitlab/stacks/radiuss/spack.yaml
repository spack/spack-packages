spack:
  view: false

  include:
  - $CI_PROJECT_DIR/.ci/gitlab/
  packages:
    all:
      target: [ "x86_64_v3" ]
      require:
      - target=x86_64_v3
      - '%gcc@7.5.0'

      providers:
        mpi: [mvapich2]

  specs:
  - ascent  # ^conduit@0.6.0
  - axom
  - blt
  - caliper
  - care  # ~benchmarks ~examples ~tests
  - chai  # ~examples
  - conduit  # ^hdf5+shared
  - flux-core
  # - flux-sched
  - hypre
  - lbann
  - lvarray ~tests  # per Spack issue #23192  # ~examples
  # - mfem  # does not work with gcc 7
  - py-hatchet
  - py-maestrowf
  - py-merlin
  - py-shroud
  - raja # ~examples  # ~tests
  - raja-perf
  - samrai
  - scr
  - sundials
  - umpire # ~openmp
  # - visit   # ^mesa-glu@9.0.0
  - xbraid
  - zfp

  cdash:
    build-group: RADIUSS
