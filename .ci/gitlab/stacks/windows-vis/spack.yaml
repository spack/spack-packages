spack:
  view: false
  include:
  - $CI_PROJECT_DIR/.ci/gitlab/

  specs:
  - "vtk@9: ~mpi"
  - "boost"
  - "netlib-lapack"
  - "py-beautifulsoup4"

  cdash:
    build-group: Windows Visualization (Kitware)
