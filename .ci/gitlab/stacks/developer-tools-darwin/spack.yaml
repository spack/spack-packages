spack:
  view: false
  include:
  - $CI_PROJECT_DIR/.ci/gitlab/

  packages:
    all:
      require:
      - target=aarch64
  concretizer:
    unify: true
    reuse: false
  specs:
    - cmake

  ci:
    pipeline-gen:
    - build-job:
        variables:
          CI_GPG_KEY_ROOT: /etc/protected-runner

  cdash:
    build-group: Developer Tools Darwin
