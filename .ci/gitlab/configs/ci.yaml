ci:
  target: gitlab

  broken-tests-packages:
    - superlu-dist    # srun -n 4 hangs
    - papyrus
    - visit # times out

  pipeline-gen:
  - build-job:
      before_script-:
      - - cat /proc/loadavg || true
        - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true
      - - touch ${SPACK_USER_CACHE_PATH}/cache/*/*  # bump mtime of cache so it is not invalidated
      - - spack env activate --without-view ${SPACK_CONCRETE_ENV_DIR}
        - spack repo list
        - spack compiler list
      - - mkdir -p ${SPACK_ARTIFACTS_ROOT}/user_data
        # AWS runners mount E4S public key (verification), UO runners mount public/private (signing/verification)
      - - k=$CI_GPG_KEY_ROOT/e4s.gpg; [[ -r $k ]] && spack gpg trust -y $k
        # UO runners mount intermediate ci public key (verification), AWS runners mount public/private (signing/verification)
        - k=$CI_GPG_KEY_ROOT/intermediate_ci_signing_key.gpg; [[ -r $k ]] && spack gpg trust -y $k
        - k=$CI_GPG_KEY_ROOT/spack_public_key.gpg; [[ -r $k ]] && spack gpg trust -y $k
      script::
      - - if [ -n "$SPACK_EXTRA_MIRROR" ]; then spack mirror add local "${SPACK_EXTRA_MIRROR}/${SPACK_CI_STACK_NAME}"; fi
        - spack config blame mirrors
        - spack spec "/${SPACK_JOB_SPEC_DAG_HASH}"
      - - spack --color=always ci rebuild -j ${SPACK_BUILD_JOBS} --tests --timeout 300 > >(tee ${SPACK_ARTIFACTS_ROOT}/user_data/pipeline_out.txt) 2> >(tee ${SPACK_ARTIFACTS_ROOT}/user_data/pipeline_err.txt >&2)
      after_script:
      - - cat /proc/loadavg || true
        - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true
      - - time ${SPACK_CI_SPACK_ROOT}/bin/spack python ${SPACK_CI_PACKAGES_ROOT}/.ci/gitlab/scripts/common/aggregate_package_logs.spack.py
          --prefix /home/software/spack:${CI_PROJECT_DIR}/opt/spack
          --log install_times.json
          ${SPACK_ARTIFACTS_ROOT}/user_data/install_times.json || true
      variables:
        CI_JOB_SIZE: "default"
        SPACK_BUILD_JOBS: "4"
        KUBERNETES_CPU_REQUEST: "4000m"
        KUBERNETES_MEMORY_REQUEST: "16G"
        CI_GPG_KEY_ROOT: /mnt/key
        # SPACK_VERBOSE_SCRIPT: "1"
      id_tokens:
        GITLAB_OIDC_TOKEN:
          aud: "${OIDC_TOKEN_AUDIENCE}"
      # Retry for everything but "legitimate build failures" (script_failure)
      retry:
        max: 2
        when::
          - unknown_failure
          - api_failure
          - stuck_or_timeout_failure
          - runner_system_failure
          - runner_unsupported
          - stale_schedule
          - job_execution_timeout
          - archived_failure
          - unmet_prerequisites
          - scheduler_failure
          - data_integrity_failure

  - signing-job:
      image:
        name: ghcr.io/spack/notary@sha256:a1e2575e12a1d60083a65f0a1b35abf0df85d7086e7f8b10c2a9926614a46127
        entrypoint: [""]
      tags: ["aws"]
      script:
      - - export BUILD_CACHE="${SPACK_BUILDCACHE_DESTINATION}/${SPACK_BUILDCACHE_RELATIVE_SPECS_URL}"
        - mkdir -p /tmp/input /tmp/output
        - aws s3 sync --exclude "*" --include "*spec.manifest.json" ${BUILD_CACHE} /tmp/input
        - /sign.sh
        - aws s3 sync --exclude "*" --include "*spec.manifest.json" /tmp/output ${BUILD_CACHE}
        - |+
          for keyfile in $( find /tmp/public_keys -type f );
          do
            spack gpg trust -y $keyfile
          done
        - spack gpg publish --update-index --mirror-url ${SPACK_BUILDCACHE_DESTINATION}
      id_tokens:
        GITLAB_OIDC_TOKEN:
          aud: "${OIDC_TOKEN_AUDIENCE}"

  - copy-job:
      tags: ["service", "x86_64"]
      image: "ghcr.io/spack/python-aws-bash:0.0.1"
      before_script:
      - - if [[ $CI_COMMIT_TAG == "v"* ]]; then export SPACK_REPLACE_VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/\(v[[:digit:]]\+\.[[:digit:]]\+\).*/releases\/\1/'); fi
        - if [[ $CI_COMMIT_TAG == "develop-"* ]]; then export SPACK_REPLACE_VERSION=develop; fi
        - export SPACK_COPY_ONLY_SOURCE=${SPACK_BUILDCACHE_SOURCE//SPACK_REPLACE_VERSION/${SPACK_REPLACE_VERSION}}
      script:
      - - spack env activate --without-view ${SPACK_CONCRETE_ENV_DIR}
        # TODO: remove this when we stop getting windows config includes added to the environment
        - spack config add 'config:build_stage:["$tempdir/$user/spack-stage", "$user_cache_path/stage"]'
        - spack config blame config
        - echo Copying environment specs from ${SPACK_COPY_ONLY_SOURCE} to ${SPACK_COPY_ONLY_DESTINATION}
        - spack buildcache sync "${SPACK_COPY_ONLY_SOURCE}" "${SPACK_COPY_ONLY_DESTINATION}"
        - curl -fLsS https://spack.github.io/keys/spack-public-binary-key.pub -o /tmp/spack-public-binary-key.pub
        - spack gpg trust -y /tmp/spack-public-binary-key.pub
        - spack gpg publish --mirror-url "${SPACK_COPY_ONLY_DESTINATION}"
        - spack buildcache update-index --keys "${SPACK_COPY_ONLY_DESTINATION}"
      when: "always"
      retry:
        max: 2
        when:
        - "runner_system_failure"
        - "stuck_or_timeout_failure"
        - "script_failure"
      interruptible: true
      variables:
        CI_JOB_SIZE: "medium"
        KUBERNETES_CPU_REQUEST: "4000m"
        KUBERNETES_MEMORY_REQUEST: "16G"
      id_tokens:
        GITLAB_OIDC_TOKEN:
          aud: "${OIDC_TOKEN_AUDIENCE}"

  - reindex-job:
      tags: ["service", "x86_64"]
      image: "ghcr.io/spack/ubuntu20.04-runner-x86_64:2023-01-01"
      variables:
        CI_JOB_SIZE: "medium"
        KUBERNETES_CPU_REQUEST: "4000m"
        KUBERNETES_MEMORY_REQUEST: "16G"
      id_tokens:
        GITLAB_OIDC_TOKEN:
          aud: "${OIDC_TOKEN_AUDIENCE}"

  - noop-job:
      tags: ["service_noop"]
      image: busybox@sha256:37f7b378a29ceb4c551b1b5582e27747b855bbfaa73fa11914fe0df028dc581f
      variables:
        CI_OIDC_REQUIRED: 0
        GIT_STRATEGY: "none"
        CI_JOB_SIZE: "small"
        KUBERNETES_CPU_REQUEST: "100m"
        KUBERNETES_MEMORY_REQUEST: "5M"
      before_script:: []
      after_script:: []

  - any-job:
      tags: ["spack"]
      image: "ghcr.io/spack/e4s-ubuntu-18.04:v2021-10-18"
      variables:
        # Disable local configs to avoid issues on shell runners
        SPACK_DISABLE_LOCAL_CONFIG: "1"
        REMOTE_SCRIPT_CLONE_SPACK_SHA256: da9ce276f9c0fbcaaa78a90c6047588fc468a7d945e9b199309bfb8edf2c5190
        REMOTE_SCRIPT_REF: e1c30b77cd582a0aed5ff432a31fc1202427c80c
      before_script:
      - - export SPACK_USER_CACHE_PATH="${CI_PROJECT_DIR}/tmp/_user_cache/"
      - - uname -a || true
        - grep -E "vendor|model name" /proc/cpuinfo 2>/dev/null | sort -u || head -n10 /proc/cpuinfo 2>/dev/null || true
        - nproc || true
      # Clone the other repo
      - - curl -LSsO https://raw.githubusercontent.com/spack/spack-packages/$REMOTE_SCRIPT_REF/.ci/gitlab/scripts/common/clone_spack.sh
        - echo "$REMOTE_SCRIPT_CLONE_SPACK_SHA256  clone_spack.sh" > digest.txt
        - sha256sum -c digest.txt
        - sh clone_spack.sh
      - - . "${SPACK_CI_SPACK_ROOT}/share/spack/setup-env.sh"
        - spack --version
        - spack arch
