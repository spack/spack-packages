ci:
  broken-tests-packages:
  - mpich
  - openmpi
  - py-mpi4py
  pipeline-gen:
  - build-job-remove:
      tags: [spack]
  - build-job:
      timeout: 120 minutes
      tags: [ "macos-sequoia", "apple-clang-16", "aarch64-macos" ]
      before_script:
      - gpg-connect-agent -vvv
  - build-job-remove:
      image:: macos-run-on-metal
