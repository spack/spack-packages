# Cray definitions
.generate-cray:
  extends: [ ".generate-common", ".base-job" ]
  variables:
    # Override concretization pool for metal runners
    SPACK_CONCRETIZE_JOBS: 16

  before_script:
    - echo $PATH
    - module avail
    - module list
    - uname -a || true
    - grep -E 'vendor|model name' /proc/cpuinfo 2>/dev/null | sort -u || head -n10 /proc/cpuinfo 2>/dev/null || true
    - nproc || true
    - cat /proc/loadavg || true
    - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true
    - *clone_spack
    - . "${SPACK_CI_SPACK_ROOT}/share/spack/setup-env.sh"
    - spack arch
  after_script:
    - cat /proc/loadavg || true
    - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true

.generate-cray-rhel:
  tags: [ "cray-rhel-x86_64_v3", "public" ]
  extends: [ ".generate-cray" ]

.generate-cray-sles:
  tags: [ "cray-sles-zen4", "public" ]
  extends: [ ".generate-cray" ]


