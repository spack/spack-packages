stages: [ "generate", "build" ]

variables:
  SPACK_CI_GENERATE: "generate"
  SPACK_DISABLE_LOCAL_CONFIG: "1"
  SPACK_USER_CACHE_PATH: "${CI_PROJECT_DIR}/tmp/_user_cache/"
  # PR_MIRROR_FETCH_DOMAIN: "https://binaries-prs.spack.io"
  PR_MIRROR_FETCH_DOMAIN: "s3://spack-binaries-prs"
  PR_MIRROR_PUSH_DOMAIN: "s3://spack-binaries-prs"
  # PROTECTED_MIRROR_FETCH_DOMAIN: "https://binaries.spack.io"
  PROTECTED_MIRROR_FETCH_DOMAIN: "s3://spack-binaries"
  PROTECTED_MIRROR_PUSH_DOMAIN: "s3://spack-binaries"
  # SPACK_CI_DISABLE_STACKS:
  #   value: /^.*(cray).*$/
  #   expand: false
  # SPACK_CI_ENABLE_STACKS:
  #   value: /^.*(cray).*$/
  #   expand: false

default:
  image: { "name": "ghcr.io/spack/e4s-ubuntu-18.04:v2021-10-18", "entrypoint": [""] }

.clone_spack: &clone_spack
  - mkdir .ci/tmp
  - mkdir .ci/tmp/spack
  - cd .ci/tmp/spack
  - git init
  - git remote add origin https://github.com/${SPACK_CHECKOUT_REPO}.git
  - echo ${SPACK_CHECKOUT_VERSION}
  - git fetch --depth 1 origin ${SPACK_CHECKOUT_VERSION}
  - git checkout FETCH_HEAD
  - cd ${CI_PROJECT_DIR}

.trigger_build: &trigger_build
  strategy: depend
  forward:
    pipeline_variables: true

.common_pr_vars: &common_pr_vars
    SPACK_PIPELINE_TYPE: "spack_pull_request"
    SPACK_PRUNE_UNTOUCHED_DEPENDENT_DEPTH: "1"
    # TODO: Change sync script to include target in branch name.  Then we could
    # TODO: have multiple types of "PR" pipeline here.  It would be better if we could
    # TODO: keep just this one and use a regex to capture the target branch, but so
    # TODO: far gitlab doesn't support that.
    PR_TARGET_REF_NAME: "develop"
    PIPELINE_MIRROR_TEMPLATE: "multi-src-mirrors.yaml.in"
    OIDC_TOKEN_AUDIENCE: "pr_binary_mirror"

.package_on_change: &package_on_change
    paths:
      - .ci/env
      - .ci/gitlab/**/*
      - repos/spack_repo/**/*
      - stacks/$SPACK_CI_STACK_NAME/**/*
    compare_to: HEAD~1

  ########################################
# Job templates
########################################
.base-job:
  variables:
    PIPELINE_MIRROR_TEMPLATE: "single-src-protected-mirrors.yaml.in"
    SPACK_CI_CONFIG_ROOT: "${SPACK_CI_PACKAGES_ROOT}/.ci/gitlab/configs"
    SPACK_CI_SCRIPTS_ROOT: "${SPACK_CI_PACKAGES_ROOT}/.ci/gitlab/scripts"

  rules:
    - if: $SPACK_CI_DISABLE_STACKS =~ /.+/ && $SPACK_CI_STACK_NAME =~ $SPACK_CI_DISABLE_STACKS
      when: never
    - if: $SPACK_CI_ENABLE_STACKS =~ /.+/ && $SPACK_CI_STACK_NAME !~ $SPACK_CI_ENABLE_STACKS
      when: never
    - if: $CI_PROJECT_NAME == "spack" && $CI_COMMIT_REF_NAME =~ /^releases\/v.*/
      # Skip release pipelines for spack/spack. Release caches are only made for releases from
      # spack/spack-packages
      when: never
    - if: $CI_COMMIT_REF_NAME == "develop" || $CI_COMMIT_REF_NAME =~ /^releases\/v.*/
      # Pipelines on develop/release branches only rebuild what is missing from the mirror
      when: on_success
      variables:
        SPACK_PIPELINE_TYPE: "spack_protected_branch"
        SPACK_PRUNE_UNTOUCHED: "False"
        SPACK_COPY_BUILDCACHE: "${PROTECTED_MIRROR_PUSH_DOMAIN}/${CI_COMMIT_REF_NAME}"
        SPACK_REQUIRE_SIGNING: "True"
        OIDC_TOKEN_AUDIENCE: "protected_binary_mirror"
    - if: $CI_COMMIT_TAG =~ /^v.*/ || $CI_COMMIT_TAG =~ /^develop-[\d]{4}-[\d]{2}-[\d]{2}$/
      when: always
      variables:
        NOOP_JOB: 1
    - if: $CI_COMMIT_REF_NAME =~ /^pr[\d]+_.*$/ && $CI_PROJECT_NAME == "spack-packages"
      # Pipelines on PR branches rebuild only what's missing, and do extra pruning
      when: on_success
      variables:
        <<: *common_pr_vars
        SPACK_PRUNE_UNTOUCHED: "True"
      changes: *package_on_change

    - if: $CI_COMMIT_REF_NAME =~ /^pr[\d]+_.*$/ && $CI_PROJECT_NAME == "spack"
      # Pipelines on PR branches rebuild only what's missing, and do extra pruning
      when: always
      variables:
        <<: *common_pr_vars
        SPACK_PRUNE_UNTOUCHED: "False"

.generate-common:
  stage: generate
  script:
    - spack --version
    - spack env activate --without-view ${SPACK_CI_PACKAGES_ROOT}/stacks/${SPACK_CI_STACK_NAME}
    - spack repo list
    - spack compiler find
    - spack audit configs
    - spack python ${SPACK_CI_SCRIPTS_ROOT}/common/expand_vars.py
      "${SPACK_CI_CONFIG_ROOT}/${PIPELINE_MIRROR_TEMPLATE}"
      "${SPACK_CI_CONFIG_ROOT}/mirrors.yaml"
    - spack config add -f "${SPACK_CI_CONFIG_ROOT}/mirrors.yaml"
    - mkdir "${CI_PROJECT_DIR}/jobs_scratch_dir"
    - mkdir "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}"
    - spack
      config blame > "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}/spack.yaml.blame"
    - spack -v  --color=always
      ci generate --check-index-only -j ${SPACK_CONCRETIZE_JOBS}
      --forward-variable SPACK_CHECKOUT_VERSION
      --forward-variable SPACK_CHECKOUT_REPO
      --forward-variable SPACK_CI_PACKAGES_ROOT
      --forward-variable SPACK_CI_SPACK_ROOT
      --artifacts-root "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}"
      --output-file "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}/cloud-ci-pipeline.yml"
  artifacts:
    when: always
    paths:
      - "${CI_PROJECT_DIR}/jobs_scratch_dir"
      - "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}"
      - "${CI_PROJECT_DIR}/tmp/_user_cache/cache/patches"
      - "${CI_PROJECT_DIR}/tmp/_user_cache/cache/providers"
      - "${CI_PROJECT_DIR}/tmp/_user_cache/cache/tags"
  variables:
    SPACK_CONCRETIZE_JOBS: 8
    KUBERNETES_CPU_REQUEST: 8000m
    KUBERNETES_MEMORY_REQUEST: 16G
    # avoid moving targets like branches and tags
    SPACK_CONCRETIZER_REQUIRE_CHECKSUM: 1
  interruptible: true
  timeout: 60 minutes
  # Retry for everything but "legitimate build failures" (script_failure)
  retry:
    max: 2
    when:
      - unknown_failure
      - api_failure
      - stuck_or_timeout_failure
      - runner_system_failure
      - runner_unsupported
      - stale_schedule
      - job_execution_timeout
      - archived_failure
      - unmet_prerequisites
      - scheduler_failure
      - data_integrity_failure

# Generate without tags for cases using external runners
.generate-base:
  extends: [ ".base-job", ".generate-common" ]
  before_script:
    # Check if bypass for noop is set
    - |
      [ ! -z ${NOOP_JOB} ] && \
      python3 ${SPACK_CI_SCRIPTS_ROOT}/common/noop_job.py \
      "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}/cloud-ci-pipeline.yml"
    - |
      [ ! -z ${NOOP_JOB} ] && exit 0
    - uname -a || true
    - grep -E 'vendor|model name' /proc/cpuinfo 2>/dev/null | sort -u || head -n10 /proc/cpuinfo 2>/dev/null || true
    - nproc || true
    - cat /proc/loadavg || true
    - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true
    - *clone_spack
    - . "${SPACK_CI_SPACK_ROOT}/share/spack/setup-env.sh"
    - spack arch
  after_script:
    - cat /proc/loadavg || true
    - cat /proc/meminfo | grep 'MemTotal\|MemFree' || true

.generate-x86_64:
  variables:
    SPACK_CI_TARGET: "x86_64_v3"
  extends: [ ".generate-base" ]
  tags: ["spack", "public", "medium", "x86_64_v3"]

.generate-aarch64:
  variables:
    SPACK_CI_TARGET: "aarch64"
  extends: [ ".generate-base" ]
  tags: ["spack", "public", "medium", "aarch64"]

.generate-neoverse_v1:
  variables:
    SPACK_CI_TARGET: "neoverse_v1"
  extends: [ ".generate-base" ]
  tags: ["spack", "public", "medium", "aarch64", "neoverse_v1"]

.generate-neoverse-v2:
  variables:
    SPACK_CI_TARGET: "neoverse_v2"
  extends: [ ".generate-base" ]
  tags: ["spack", "public", "medium", "neoverse_v2"]

.generate-win64:
  extends: [ ".base-job", ".generate-common" ]
  before_script:
    - $ErrorActionOld=$ErrorActionPreference
    - $ErrorActionPreference="SilentlyContinue"
    - |
      If ( $NOOP_JOB )
      {
          python ${SPACK_CI_SCRIPTS_ROOT}/common/noop_job.py "${CI_PROJECT_DIR}/jobs_scratch_dir/${SPACK_CI_STACK_NAME}/cloud-ci-pipeline.yml"
      }
    - |
      If ( $NOOP_JOB ) { exit 0 }
    - python -c"import psutil;print(psutil.getloadavg())"
    - (Get-WmiObject Win32_PhysicalMemory | measure-object Capacity -sum).sum/1kb
    - $ErrorActionPreference=$ErrorActionOld
    - *clone_spack
    - . $SPACK_CI_SPACK_ROOT\share\spack\setup-env.ps1
    - spack arch
  after_script:
    - $ErrorActionOld=$ErrorActionPreference
    - $ErrorActionPreference="SilentlyContinue"
    - python -c"import psutil;print(psutil.getloadavg())"
    - (Get-WmiObject Win32_PhysicalMemory | measure-object Capacity -sum).sum/1kb
    - $ErrorActionPreference=$ErrorActionOld

  tags: ["spack", "public", "medium", "x86_64-win"]
  image: {
    name: "ghcr.io/johnwparent/windows-server21h2:sha-1c12b61",
    entrypoint: [""]
  }

.build:
  extends: [ ".base-job" ]
  stage: build


# Inject the dotenv file
dotenv:
  stage: .pre
  variables:
    CI_OIDC_REQUIRED: 0
    KUBERNETES_CPU_REQUEST: "100m"
    KUBERNETES_MEMORY_REQUEST: "5M"
  artifacts:
    reports:
      dotenv: env
  tags: [ "spack", "service" ]
  script:
  - export WRITE_DOTENV_SCRIPT_REF="0f92f8bcd4dd94fc7379eef8db5c9ed6f1935402"
  - export WRITE_DOTENV_SCRIPT_SHA256="124d80ef595b9ddc2fca3f202a70ee15378547ad5e887fe7d3b248669c5ee54a"
  - curl -LSsO https://raw.githubusercontent.com/spack/spack-packages/$WRITE_DOTENV_SCRIPT_REF/.ci/gitlab/scripts/common/write_dotenv.py
  - echo "$WRITE_DOTENV_SCRIPT_SHA256  write_dotenv.py" | sha256sum -c
  - python3 write_dotenv.py .ci/env
  - cat env

force_pipeline_status:
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^pr[\d]+_.*$/ && $CI_PROJECT_NAME == "spack-packages"
      changes: *package_on_change
      when: never
    - if: $CI_PROJECT_NAME == "spack"
      when: never
    - if: $CI_COMMIT_REF_NAME =~ /^pr[\d]+_.*$/
      when: always
    - when: never
  stage: generate
  tags: ["spack", "service_noop"]
  retry: 0
  allow_failure: true
  image: busybox@sha256:37f7b378a29ceb4c551b1b5582e27747b855bbfaa73fa11914fe0df028dc581f
  variables:
    CI_OIDC_REQUIRED: 0
    GIT_STRATEGY: "none"
    CI_JOB_SIZE: "small"
    KUBERNETES_CPU_REQUEST: "100m"
    KUBERNETES_MEMORY_REQUEST: "5M"
  script:
  - echo "This job is a placeholder job to ensure a pipeline status is posted even if no jobs are run"

########################################
# TEMPLATE FOR ADDING ANOTHER PIPELINE
########################################
#
# First add a new spack.yml defining the pipeline to run in
# stacks/my-stack/spack.yaml
#
# Then add the following entries at the bottom of this file.
#
# Note that when extending other jobs, gitlab does not merge lists (nor
# does it merge dictionary values in the case of key conflicts).  So lists
# and duplicated dictionary keys are simply overridden.  For this reason,
# you should inlclude your custom definitions at the end of the of the
# extends list.
#
########################################
# My Stack Pipeline
########################################
# .my-stack:
#   variables:
#     SPACK_CI_STACK_NAME: my-stack
#
# my-stack-generate:
#   extends: [ ".generate", ".my-stack" ]
#
# my-stack-build:
#   extends: [ ".build", ".my-stack" ]
#   trigger:
#     <<: *trigger_build
#     include:
#       - artifact: jobs_scratch_dir/my-stack/cloud-ci-pipeline.yml
#         job: my-stack-generate
#   needs:
#     - artifacts: True
#       job: my-stack-generate

########################################
# E4S pipeline
########################################
.e4s:
  variables:
    SPACK_CI_STACK_NAME: e4s

e4s-generate:
  extends: [ ".e4s", ".generate-x86_64"]
  image: ghcr.io/spack/spack/ubuntu22.04-runner-amd64-gcc-11.4:2024.03.01

e4s-build:
  extends: [ ".e4s", ".build" ]
  trigger:
    << : *trigger_build
    include:
      - artifact: jobs_scratch_dir/e4s/cloud-ci-pipeline.yml
        job: e4s-generate
  needs:
    - artifacts: True
      job: e4s-generate

