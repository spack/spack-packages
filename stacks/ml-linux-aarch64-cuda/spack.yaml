spack:
  view: false

  include:
  - ../../.ci/gitlab/
  packages:
    all:
      target: ["aarch64"]
      require:
      - target=aarch64
      - ~rocm
      - +cuda
      - cuda_arch=80
    llvm:
      # https://github.com/spack/spack/issues/27999
      require:
      - ~cuda
      - target=aarch64
    mpi:
      require: openmpi
    python:
      require: "@3.13: target=aarch64"
    py-jaxlib:
      require: "target=aarch64 %c,cxx=clang"
    py-tensorflow:
      require:
        - any_of: ["@:2.18 %c,cxx=gcc", "@2.19: %c,cxx=clang"]
        - target=aarch64
    py-torch:
      require:
      - target=aarch64
      - ~rocm
      - +cuda
      - cuda_arch=80
      - ~flash_attention
      - "%c,cxx=gcc"

  specs:
    # Hugging Face
    - py-transformers

    # JAX
    - py-jax
    - py-jaxlib

    # Keras
    - py-keras backend=tensorflow
    - py-keras backend=jax
    - py-keras backend=torch

    # PyTorch
    - py-botorch
    - py-gpytorch
    - py-kornia
    - py-lightning
    - py-pytorch-lightning
    - py-segmentation-models-pytorch
    - py-timm
    - py-torch
    - py-torch-geometric
    - py-torch-nvidia-apex
    - py-torchaudio
    - py-torchdata
    - py-torchgeo
    - py-torchmetrics
    - py-torchvision
    - py-vector-quantize-pytorch

    # scikit-learn
    - py-scikit-learn

    # TensorBoard
    - py-tensorboard
    - py-tensorboardx

    # TensorFlow
    - py-tensorflow
    - py-tensorflow-datasets
    - py-tensorflow-metadata
    - py-tensorflow-probability

    # XGBoost
    # xgboost requires older cuda, which doesn't support newer GCC
    # - py-xgboost

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/ubuntu-24.04:v2025-09-15
          entrypoint: ['']

  cdash:
    build-group: Machine Learning
