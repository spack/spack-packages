spack:
  view: false

  include:
  - ../../.ci/gitlab/

  packages:
    all:
      variants: +mpi cuda_arch=70
      require:
      - target=x86_64_v3
    blas:
      require:
      - openblas
    mkl:
      require:
          - intel-oneapi-mkl
    mpi:
      require:
      - one_of:
        - openmpi
        - mpich

  specs:
  - ascent
  - blt
  - caliper
  - caliper +cuda
  - camp
  - camp +cuda
  - chai
  - chai +cuda +raja
  - mfem
  - mfem +superlu-dist+petsc+sundials
  - mfem +cuda ^hypre+cuda
  - raja
  - raja +cuda
  - umpire
  - umpire +cuda

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/ubuntu-24.04:v2024-09-05-v2
          entrypoint: ['']

  cdash:
    build-group: RADIUSS CUDA Packages
