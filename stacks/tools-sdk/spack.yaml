spack:
  view: false

  include:
  # Include the SDK package configurations
  # TODO: Tag this with a release
  - path: https://raw.githubusercontent.com/tools-integration/tools-sdk/96ee62feaad3936185937d10185ea17731bd1c7f/spack/configs/packages.yaml
    sha256: 7e6e369f07e740e3f1cf972ed88f89da7d0c773de0ad45d80441fafed073887d
  - ../../.ci/gitlab/

  packages:
    all:
      require: target=x86_64_v3
    cmake:
      variants: ~ownlibs

  concretizer:
    unify: when_possible

  specs:
  - darshan-runtime
  - darshan-util
  - dyninst
  - hpctoolkit
  - papi
  - tau

  ci:
    pipeline-gen:
    - build-job:
        image: ghcr.io/spack/ubuntu20.04-runner-x86_64:2023-01-01

  cdash:
    'build-group:': TOOLS SDK

