spack:
  view: false

  include:
  - ../../.ci/gitlab/

  concretizer:
    reuse: false
    unify: false
    static_analysis: true

  packages:
    all:
      require:
      - target=x86_64_v3
      variants: +mpi
    c:
      require: gcc
    cxx:
      require: gcc
    fortran:
      require: gcc
    mpi:
      require:
      - mpich
    blas:
      require:
      - openblas +shared
    lapack:
      require:
      - openblas +shared
    opengl:
      buildable: false
    binutils:
      variants: +ld +gold +headers +libiberty ~nls
    hdf5:
      prefer:
      - +fortran +hl +shared
    libfabric:
      require:
      # TODO: libfabric needs to build on a GPU node with CUDA runtime available to build +cuda
      # configure: error: CUDA support requested but CUDA runtime not available.
      - ~cuda
      - fabrics=sockets,tcp,udp,rxm
      - target=x86_64_v3
    libunwind:
      variants: +pic +xz
    openblas:
      variants: threads=openmp
    rccl:
      variants: amdgpu_target=gfx90a
    rocblas:
      require: ~hipblaslt #hangs in ci
    trilinos:
      prefer:
      - +amesos +amesos2 +anasazi +aztec +belos +boost +epetra +epetraext
        +ifpack +ifpack2 +intrepid +intrepid2 +isorropia +kokkos +ml +minitensor +muelu
        +nox +piro +phalanx +rol +rythmos +sacado +stk +shards +shylu +stokhos +stratimikos
        +teko +tempus +thyra +tpetra +trilinoscouplings +zoltan +zoltan2 gotype=long_long
      - target=x86_64_v3
    mpich:
      require:
      - '~wrapperrpath ~hwloc'
      - target=x86_64_v3
    suite-sparse:
      require:
        # TODO: CUDA build is broken as of 9be63a7775253884e12c9f3b6c0cec3ca86d252e
        # make: *** SuiteSparse_GPURuntime: No such file or directory.  Stop
        - ~cuda
        - target=x86_64_v3
    tbb:
      require:
      - intel-tbb
    vtk-m:
      require:
      - +examples
      - target=x86_64_v3
    visit:
      require:
      - "~gui"
      - target=x86_64_v3
    paraview:
      # Don't build GUI support or GLX rendering for HPC/container deployments
      require:
      - +examples
      - "~qt ^[virtuals=gl] osmesa" # Headless
      - target=x86_64_v3
    boost:
      require:
      - cxxstd=17
      - target=x86_64_v3

  definitions:
  - cuda_specs:
    - amrex
    - arborx ^kokkos
    - axom
    - cabana ^kokkos +cuda_lambda
    - caliper
    - chai ^umpire
    - chapel
    - cusz
    #- dealii~arborx~kokkos~vtk cxxstd=17
    - ecp-data-vis-sdk  +adios2 ~ascent +hdf5 +vtkm +zfp ~paraview
    # Exago still requires an old version of Raja that doesn't support the CUDA arch we want to build for
    # - exago +mpi +python +raja +hiop  ~ipopt ^hiop@1.0.0 ~sparse +mpi +raja ^raja~cuda
    - fftx
    - flecsi
    - ginkgo
    - gromacs
    - heffte
    - hpx
    - hypre
    - kokkos
    - kokkos-kernels
    - kokkos-fft device_backend=cufft +tests
    - libceed
    - libpressio +bitgrooming +bzip2 +fpzip +hdf5 +libdistributed +lua +openmp +python +sz +sz3 +unix +zfp +json +remote +netcdf +cusz +mgard ^cusz
    - magma
    - mfem
    - mgard +serial +openmp +timing +unstructured
    - omega-h
    - parsec
    - petsc
    - py-torch
    - raja
    - slate
    - slepc
    - strumpack ~slate
    - sundials
    - superlu-dist
    - tasmanian
    - trilinos
    - umpire
    - adios2
    - vtk-m
    - zfp
  specs:
  # CPU
  - adios
  - alquimia
  - aml
  - amrex
  - arborx
  - argobots
  - arkouda
  - axom
  - bolt
  - boost
  - bricks ~cuda
  - butterflypack
  - cabana
  - caliper
  - chai
  - chapel ~rocm ~cuda
  - charliecloud
  - conduit
  - cp2k +mpi
  - datatransferkit
  #- dealii ~arborx ~kokkos ~vtk cxxstd=17 # https://github.com/spack/spack/pull/45554#issuecomment-2457255720
  - drishti
  - dxt-explorer
  - dyninst
  - e4s-cl
  - ecp-data-vis-sdk ~cuda ~rocm +adios2 +ascent +cinema +darshan +faodel +hdf5 +paraview +pnetcdf +sz +unifyfs +veloc +visit +vtkm +zfp #
  - exaworks
  - fftx
  - flecsi
  - flit
  - flux-core
  - fortrilinos
  - fpm
  - gasnet
  - libgeopm
  - ginkgo
  - globalarrays
  - glvis
  - gmp
  - gotcha
  # - gptune ~mpispawn
  - gromacs +cp2k ^cp2k +dlaf build_system=cmake
  - h5bench
  - hdf5-vol-async
  - hdf5-vol-cache
  - hdf5-vol-log
  - heffte +fftw
  - hpctoolkit
  - hpx networking=mpi
  - hypre
  - julia ^llvm ~clang ~gold ~polly targets=amdgpu,bpf,nvptx,webassembly
  - kokkos +openmp
  - kokkos-kernels +openmp
  - kokkos-fft host_backend=fftw-openmp +tests
  - laghos
  - lammps +amoeba +asphere +bocs +body +bpm +brownian +cg-dna +cg-spica +class2 +colloid +colvars +compress +coreshell +dielectric +diffraction +dipole +dpd-basic +dpd-meso +dpd-react +dpd-smooth +drude +eff +electrode +extra-compute +extra-dump +extra-fix +extra-molecule +extra-pair +fep +granular +interlayer +kspace +lepton +machdyn +manybody +mc +meam +mesont +misc +ml-iap +ml-pod +ml-snap +mofff +molecule +openmp-package +opt +orient +peri +phonon +plugin +poems +qeq +reaction +reaxff +replica +rigid +shock +sph +spin +srd +tally +uef +voronoi +yaff
  - lbann
  - legion
  - libceed
  - libnrm
  - libpressio +bitgrooming +bzip2 ~cuda ~cusz +fpzip +hdf5 +libdistributed +lua +openmp +python +sz +sz3 +unix +zfp
  - libquo
  - libunwind
  - loki
  - mercury
  - metall
  - mfem
  - mgard +serial +openmp +timing +unstructured ~cuda
  - mpark-variant
  - mpifileutils ~xattr
  - nccmp
  - nco
  - nekbone +mpi
  - netcdf-fortran
  - netlib-scalapack
  - nrm
  - nvhpc
  - nwchem
  - omega-h
  - openfoam
  - openmpi
  - openpmd-api
  - papi
  - papyrus
  - parsec ~cuda
  - pdt
  - petsc
  - phist
  - plasma
  - plumed
  - precice
  - pruners-ninja
  - pumi
  - py-amrex
  - py-arkouda
  - py-h5py
  - py-jupyterhub
  - py-libensemble
  - py-petsc4py
  - qthreads scheduler=distrib
  - quantum-espresso
  - raja
  - rempi
  - scr
  - slate ~cuda
  - slepc
  - stc
  - strumpack ~slate
  - sundials
  - superlu
  - superlu-dist
  - swig@4.0.2-fortran
  - sz3
  - tasmanian
  - tau +mpi +python +syscall
  - trilinos +amesos +amesos2 +anasazi +aztec +belos +boost +epetra +epetraext +ifpack +ifpack2 +intrepid +intrepid2 +isorropia +kokkos +ml +minitensor +muelu +nox +piro +phalanx +rol +rythmos +sacado +stk +shards +shylu +stokhos +stratimikos +teko +tempus +tpetra +trilinoscouplings +zoltan +zoltan2 +superlu-dist gotype=long_long
  - turbine
  - umap
  - umpire
  - upcxx
  - variorum cpu=intel gpu=none
  - wannier90
  - wps
  - wrf
  - xyce +mpi +shared +pymi ~pymi_static_tpls
  # INCLUDED IN ECP DAV CPU
  - adios2
  - ascent
  - darshan-runtime
  - darshan-util
  - faodel
  - hdf5
  - libcatalyst
  - parallel-netcdf
  - paraview
  - py-cinemasci
  - sz
  - unifyfs
  - veloc
  - visit                           # silo: https://github.com/spack/spack/issues/39538
  - vtk-m
  - warpx +python
  - zfp
  # --
  # - nek5000 +mpi +visit             # nek5000: KeyError: 'No spec with name visit in nek5000@19.0/4mtjged6gb5yqgzlpjftjxxasqwqdysh'

  # PYTHON PACKAGES
  - opencv +python3
  - py-horovod
  - py-jax
  - py-jupyterlab
  - py-matplotlib
  - py-mpi4py
  - py-notebook
  - py-numba
  - py-numpy
  - py-openai
  - py-pandas
  - py-plotly
  - py-pooch
  - py-pytest
  - py-scikit-learn
  - py-scipy
  - py-seaborn
  - py-tensorflow
  - py-torch
  - py-deephyper

  # CUDA NOARCH
  - bricks +cuda
  - flux-core +cuda
  - hpctoolkit +cuda
  - legion +cuda
  - papi +cuda
  - tau +mpi +cuda +syscall

  - group: "cuda-80"
    specs:
    - $cuda_specs
    override:
      packages:
        all:
          prefer:
          - ~rocm
          - +cuda
          - cuda_arch=80
        kokkos:
          require:
          - ~rocm
          - +cuda +wrapper
          - cuda_arch=80
          - target=x86_64_v3
        flecsi:
          # TODO: currently fails to build with CUDA
          # /tmp/root/spack-stage/spack-stage-flecsi-2.4.1-6i3755bbt2hvmwj6soljqedj2t7jvwzm/spack-src/flecsi/exec/kernel.hh(111): error: init-captures are not allowed for extended __host__ __device__ lambdas
          # [c = std::forward<C>(c), f = std::forward<F>(f)] __attribute__((device)) __attribute__((host))(
          require:
          - ~rocm
          - ~cuda
          - target=x86_64_v3
        trilinos:
          prefer:
          - ~rocm +cuda cuda_arch=80
          - ~superlu-dist

  - group: "cuda-90"
    specs:
      - $cuda_specs
    override:
      packages:
        all:
          prefer:
          - ~rocm
          - +cuda
          - cuda_arch=90
        kokkos:
          require:
          - ~rocm
          - +cuda +wrapper
          - cuda_arch=90
          - target=x86_64_v3
        flecsi:
          # TODO: currently fails to build with CUDA
          # /tmp/root/spack-stage/spack-stage-flecsi-2.4.1-6i3755bbt2hvmwj6soljqedj2t7jvwzm/spack-src/flecsi/exec/kernel.hh(111): error: init-captures are not allowed for extended __host__ __device__ lambdas
          # [c = std::forward<C>(c), f = std::forward<F>(f)] __attribute__((device)) __attribute__((host))(
          require:
          - ~rocm
          - ~cuda
          - target=x86_64_v3
        trilinos:
          prefer:
          - ~rocm +cuda cuda_arch=90
          - ~superlu-dist

  - group: rocm
    specs:
    # ROCM NOARCH
    #- hpctoolkit +rocm
    # - tau +mpi +rocm +syscall           # tau: has issue with `spack env depfile` build

    # ROCM 90a
    - adios2 +kokkos
    - amrex
    - arborx
    - cabana
    # Can't build one of its dependencies (py-llvmlite)
    # - caliper
    - chai
    - ecp-data-vis-sdk ~paraview +vtkm # +paraview: CMake Error at VTK/ThirdParty/vtkm/vtkvtkm/vtk-m/CMakeLists.txt:272 (find_package): Could not find a package configuration file provided by "rocthrust" with any of the following names: rocthrustConfig.cmake rocthrust-config.cmake
    - gasnet
    - ginkgo
    - heffte
    - hpx
    - hypre
    - kokkos
    - lammps
    - legion
    - libceed
    - magma ~cuda
    - mfem
    - raja ~openmp
    - slate
    - strumpack ~slate
    - sundials
    - superlu-dist
    - tasmanian ~openmp
    - trilinos +amesos +amesos2 +anasazi +aztec +belos +boost +epetra +epetraext +ifpack ~ifpack2 +intrepid +intrepid2 +isorropia +kokkos +ml +minitensor +muelu +nox +piro +phalanx +rol +rythmos +sacado +stk +shards +shylu ~stokhos +stratimikos +teko +tempus +tpetra +trilinoscouplings +zoltan +zoltan2 gotype=long_long
    - umpire
    - upcxx
    # INCLUDED IN ECP DAV ROCM
    # - hdf5
    # - hdf5-vol-async
    # - hdf5-vol-cache
    # - hdf5-vol-log
    # - libcatalyst
    # - paraview # paraview: CMake Error at VTK/ThirdParty/vtkm/vtkvtkm/vtk-m/CMakeLists.txt:272 (find_package): Could not find a package configuration file provided by "rocthrust" with any of the following names: rocthrustConfig.cmake rocthrust-config.cmake
    - vtk-m ~openmp  # vtk-m: https://github.com/spack/spack/issues/40268
    # --
    # - chapel         # chapel: lld: error: undefined symbol: llvm.amdgcn.readfirstlane.i32
    # - exago +mpi +python +raja +hiop ~ipopt cxxflags="-Wno-error=non-pod-varargs" ^hiop ~sparse +mpi +raja # hiop: CMake Error at cmake/FindHiopHipLibraries.cmake:23 (find_package); By not providing "Findhipfft.cmake" in CMAKE_MODULE_PATH this project has asked CMake to find a package configuration file provided by "hipfft", but CMake did not find one.
    # - fftx           # fftx: https://github.com/spack/spack/issues/47034
    # - lbann ~cuda    # concretize: Cannot select a single "version" for package "hiptt"
    # - papi           # papi: https://github.com/spack/spack/issues/27898
    # - petsc          # petsc: hipblas-6.3.0-brvfa2h47yfpawguzbiac6ijtj3b6bcn/include/hipblas/hipblas.h:40:10: fatal error: 'hipblas-common/hipblas-common.h' file not found
    # - slepc ^petsc # slepc: ERROR: Unable to link with PETSc

    # - cp2k +mpi +cuda cuda_arch=80            # cp2k: libxsmm_gemm.c:238: undefined reference to `sgemv_'
    # - cp2k +mpi +cuda cuda_arch=90            # cp2k: libxsmm_gemm.c:238: undefined reference to `sgemv_'
    # - cp2k +mpi +rocm amdgpu_target=gfx908    # cp2k: exts/build_dbcsr//Makefile:290: calculate_norms.o] Error 127 (ignored)
    # - cp2k +mpi    # cp2k: exts/build_dbcsr//Makefile:290: calculate_norms.o] Error 127 (ignored)
    override:
      packages:
        all:
          prefer:
            - ~cuda
            - +rocm
            - amdgpu_target=gfx90a
        trilinos:
          prefer:
          - +rocm amdgpu_target=gfx90a ~cuda
          - ~superlu-dist

  ci:
    pipeline-gen:
    - build-job:
        image: ghcr.io/spack/spack/ubuntu22.04-runner-amd64-gcc-11.4:2024.03.01

  cdash:
    build-group: E4S
