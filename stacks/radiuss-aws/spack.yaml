spack:
  view: false

  include:
  - ../../.ci/gitlab/

  packages:
    all:
      target: [ "x86_64_v3" ]
      require:
      - target=x86_64_v3
      providers:
        blas:
          - openblas
        mkl:
          - intel-oneapi-mkl
        mpi:
          - openmpi
          - mpich
      variants: +mpi cuda_arch=70

  specs:
  - ascent
  - blt
  - caliper
  - caliper +cuda
  - camp
  - camp +cuda
  - chai
  - chai +cuda +raja
  - mfem
  - mfem +superlu-dist+petsc+sundials
  - mfem +cuda ^hypre+cuda
  - raja
  - raja +cuda
  - umpire
  - umpire +cuda

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/e4s-amazonlinux-2:v2025-09-15
          entrypoint: ['']

  cdash:
    build-group: RADIUSS AWS Packages
