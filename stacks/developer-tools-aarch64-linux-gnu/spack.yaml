spack:
  view: false
  include:
  - ../../.ci/gitlab/

  packages:
    all:
      require:
      - target=aarch64
      prefer:
      - '%gcc'

  concretizer:
    unify: true
    reuse: false

  specs:
    # editors
  - neovim~no_luajit
  - py-pynvim
  # FIXME (compiler as nodes): recover dependency on gcc as a library when +native
  - emacs~native+treesitter   # note, pulls in gcc
    # - tree-sitter is a dep, should also have cli but no package
  - nano   # just in case
    # tags and scope search helpers
  - universal-ctags   # only maintained ctags, works better with c++
  - direnv
    # runtimes and compilers
  - python
  - llvm+link_llvm_dylib~lld~offload~lldb~polly+python build_type=MinSizeRel   # for clangd, clang-format
  - node-js   # for editor plugins etc., pyright language server
  - npm
  - cmake
  - libtool
  - go   # to build fzf, gh, hub
  - rust+dev   # fd, ripgrep, hyperfine, exa, rust-analyzer
  - binutils+ld+gold+plugins   # support linking with built gcc
    # styling and lints
  - astyle
  - cppcheck
  - uncrustify
  - py-fprettify
  - py-fortran-language-server
  - py-python-lsp-server
  - py-isort
  - py-mypy-extensions
  - py-mypy
  - py-black
  - py-flake8
    # cli dev tools
  - ripgrep
  - gh
  - fd
  - bfs
  - fzf
  - tree
  - jq
  - py-yq
  - hub
  - ncdu
  - eza
  - lsd
  - hyperfine
  - htop
  - tmux
  - ccache
    # ensure we can use a jobserver build and do this fast
  - gmake
  - ninja   # should be @kitware, can't be because of meson requirement
  - openssl certs=system     # must be this, system external does not work
  - libtree
  - patchelf
  - sed
  - which
  - elfutils
  - fontconfig
  - font-util
  - gdb
  - flex
  - graphviz
  - doxygen
  - meson
  # spack developer tools
  # style
  - "py-mypy@0.900: ^py-mypy-extensions@:1.0"
  - py-pytest@9.0.3
  - py-ruff@0.15.0
  - py-ty@0.0.20

  ci:
    pipeline-gen:
    - build-job:
        image: ghcr.io/spack/aarch64-linux-gnu:v2024-12-18

  cdash:
    build-group: Developer Tools aarch64-linux-gnu
