spack:
  view: false

  include:
  - ../../.ci/gitlab/
  packages:
    all:
      require:
      - target=x86_64_v3
      - spec: '%gcc-runtime@12'
        when: '%gcc@12'
      - spec: '%gcc-runtime@11'
        when: '%gcc@11'
      - spec: '%gcc-runtime@10'
        when: '%gcc@10'
    tbb:
      require: intel-tbb
  definitions:
  - gcc_system_packages:
    - matrix:
      - - zlib-ng@2.2.4
        - zlib-ng@2.0.7
        - zlib-ng@2.0.7 cflags=-O3
        - tcl ^zlib-ng@2.2.4
        - tcl ^zlib-ng@2.0.7 cflags=-O3
        - hdf5+mpi^openmpi
        - hdf5~mpi
        - hdf5+hl+mpi ^mpich
        - trilinos ^openmpi
        - trilinos +hdf5 ^hdf5+hl+mpi ^mpich
        - gcc@12.3 ~binutils  # todo: enable ~binutils once unify: true is used
        - mpileaks
        - lmod@8.7.18
        - environment-modules
        - macsio@1.1+scr ^scr@2.0.0~fortran ^silo~fortran ^hdf5~fortran
        - julia@1.9 ^llvm ~clang ~gold ~lldb ~lua ~polly compiler-rt=none libcxx=none libunwind=none targets=x86 ^openblas threads=openmp
        - vim
      - ['%gcc@11']
  - gcc_old_packages:
    - zlib-ng@2.2.4%gcc@10
  - clang_packages:
    - matrix:
      - [zlib-ng@2.2.4, tcl ^zlib-ng@2.0.7]
      - ['%clang@14']
  - gcc_spack_built_packages:
    - matrix:
      - [netlib-scalapack]
      - [^mpich, ^openmpi]
      - [^openblas, ^netlib-lapack]
      - ['%gcc@12']
    - matrix:
      - [py-scipy ^openblas, armadillo ^openblas, netlib-lapack, openmpi, mpich, elpa ^mpich]
      - ['%gcc@12']
  specs:
  - $gcc_system_packages
  - $gcc_old_packages
  - $clang_packages
  - $gcc_spack_built_packages
  concretizer:
    # Hacky way to allow bootstrapping the compiler
    unify: when_possible
    compiler_mixing: false
  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/tutorial-ubuntu-22.04:main
          entrypoint: ['']
  cdash:
    build-group: Spack Tutorial
