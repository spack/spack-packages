spack:
  view: false

  include:
  - ../../.ci/gitlab/

  packages:
    all:
      require:
      - target=x86_64_v3
    tbb:
      require: intel-tbb

  specs:
  - group: compiler
    specs:
    - gcc@16 build_type=Release +profiled +strip

  - group: "gcc@15 specs"
    specs:
    - zlib-ng@2.2.4
    - zlib-ng@2.0.7
    - zlib-ng@2.0.7 cflags=-O3
    - tcl ^zlib-ng@2.2.4
    - tcl ^zlib-ng@2.0.7 cflags=-O3
    - hdf5+mpi^openmpi
    - hdf5~mpi
    - hdf5+hl+mpi ^mpich
    - trilinos ^openmpi
    - trilinos +hdf5 ^hdf5+hl+mpi ^mpich
    - mpileaks
    - lmod@8.7.67
    - environment-modules
    - macsio@1.1+scr ^scr@2.0.0~fortran ^silo~fortran ^hdf5~fortran
    - julia ^llvm ~clang ~gold ~lldb ~lua ~polly compiler-rt=none libcxx=none libunwind=none targets=x86 ^openblas threads=openmp
    - vim
    override:
      packages:
        c:
          prefer: [gcc@15]
        cxx:
          prefer: [gcc@15]
        fortran:
          prefer: [gcc@15]

  - group: scalapacks
    needs: [compiler]
    specs:
    - matrix:
      - [netlib-scalapack]
      - [^mpich, ^openmpi]
      - [^openblas, ^netlib-lapack]
    - matrix:
      - [py-scipy ^openblas, armadillo ^openblas, netlib-lapack, openmpi, mpich, elpa ^mpich]
    override:
      packages:
        c:
          prefer: [gcc@16]
        cxx:
          prefer: [gcc@16]
        fortran:
          prefer: [gcc@16]
  # Miscellaneous specs use the default group
  # - zlib-ng@2.2.4%gcc@10
  #- matrix:
  #  - [ zlib-ng@2.2.4, tcl ^zlib-ng@2.0.7 ]
  #  - [ '%clang@14' ]

  concretizer:
    unify: false

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/tutorial-ubuntu-26.04:v2026-06-09
          entrypoint: ['']

  cdash:
    build-group: Spack Tutorial
