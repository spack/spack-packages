spack:
  view: false

  include:
  - ../../.ci/gitlab/
  packages:
    all:
      target: ["x86_64_v3"]
      require:
      - target=x86_64_v3
    mpi:
      require: openmpi
    python:
      require: "@3.13: target=x86_64_v3"
    py-jaxlib:
      require: "target=x86_64_v3 %c,cxx=clang"
    py-tensorflow:
      require: "target=x86_64_v3 %c,cxx=clang"

  definitions:
  - hugging_face_specs:
    - py-transformers
  - jax_specs:
    - py-jax
    - py-jaxlib
  - keras_specs:
    - py-keras backend=tensorflow
    - py-keras backend=jax
    - py-keras backend=torch
  - torch_specs:
    - py-botorch
    - py-gpytorch
    - py-kornia
    - py-lightning
    - py-pytorch-lightning
    - py-segmentation-models-pytorch
    - py-timm
    - py-torch
    - py-torch-geometric
    - py-torch-nvidia-apex
    - py-torchaudio
    - py-torchdata
    - py-torchgeo
    - py-torchmetrics
    - py-torchvision
    - py-vector-quantize-pytorch
  - scikit_learn_specs:
    - py-scikit-learn
  - tensorboard_specs:
    - py-tensorboard
    - py-tensorboardx
  - tensorflow_specs:
    - py-tensorflow
    - py-tensorflow-datasets
    - py-tensorflow-metadata
    - py-tensorflow-probability
  - xgboost_specs:
    - py-xgboost
  specs:
  - group: ml-linux-x86_64-cpu
    specs:
    - $hugging_face_specs
    - $jax_specs
    - $keras_specs
    - $torch_specs
    - $scikit_learn_specs
    - $tensorboard_specs
    - $tensorflow_specs
    - $xgboost_specs
    override:
      packages:
        all:
          require:
            - ~cuda
            - ~rocm
        py-torch:
          require: "target=x86_64_v3 %c,cxx=gcc"

  - group: ml-linux-x86_64-cuda
    specs:
    - $hugging_face_specs
    - $jax_specs
    - $keras_specs
    - $torch_specs
    - $scikit_learn_specs
    - $tensorboard_specs
    - $tensorflow_specs
    # xgboost requires older cuda, which doesn't support newer GCC
    # - $xgboost_specs
    override:
      packages:
        all:
          require:
            - ~rocm
            - +cuda
            - cuda_arch=80
        llvm:
          # https://github.com/spack/spack/issues/27999
          require:
            - ~cuda
            - target=x86_64_v3
        py-torch:
          require:
            - target=x86_64_v3
            - ~rocm
            - +cuda
            - cuda_arch=80
            - ~flash_attention
            - "%c,cxx=gcc"

  - group: ml-linux-x86_64-rocm
    specs:
    - $hugging_face_specs
    - $jax_specs
    - matrix:
      - [$keras_specs]
      exclude:
      - py-keras backend=torch
    # Does not yet support Spack-installed ROCm
    # - $torch_specs
    - $scikit_learn_specs
    - $tensorboard_specs
    - $tensorflow_specs
    # Does not yet support Spack-installed ROCm
    # - $xgboost_specs
    override:
      packages:
        all:
          require:
            - ~cuda
            - +rocm
            - amdgpu_target=gfx90a
        eigen:
          require:
          - ~rocm target=x86_64_v3
        gl:
          require: "osmesa"
        py-torch:
          require:
            - target=x86_64_v3
            - ~cuda
            - +rocm
            - amdgpu_target=gfx90a
            - ~flash_attention
            - "%c,cxx=gcc"

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/ubuntu-24.04:v2025-09-15
          entrypoint: ['']

  cdash:
    build-group: Machine Learning
