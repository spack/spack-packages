spack:
  view: false

  include:
  - ../../.ci/gitlab/

  concretizer:
    reuse: false
    unify: false
    static_analysis: false

  packages:
    all:
      target: [x86_64_v3]
      require:
      - '@:99999999'
      - 'target=x86_64_v3'
      providers:
        c: [intel-oneapi-compilers, gcc]
        cxx: [intel-oneapi-compilers, gcc]
        fortran: [intel-oneapi-compilers, gcc]
        blas: [openblas]
        tbb: [intel-tbb]
      variants: +mpi

    elfutils:
      variants: ~nls
    hdf5:
      variants: +fortran +hl +shared
    libfabric:
      variants: fabrics=sockets,tcp,udp,rxm
    libunwind:
      variants: +pic +xz
    ncurses:
      variants: +termlib
    openblas:
      variants: threads=openmp
      require: 'cppflags="-O1" target=x86_64_v3 %oneapi'
    trilinos:
      variants: +amesos +amesos2 +anasazi +aztec +belos +boost +epetra +epetraext
        +ifpack +ifpack2 +intrepid +intrepid2 +isorropia +kokkos +ml +minitensor +muelu
        +nox +piro +phalanx +rol +rythmos +sacado +stk +shards +shylu +stokhos +stratimikos
        +teko +tempus +tpetra +trilinoscouplings +zoltan +zoltan2 +superlu-dist gotype=long_long
    xz:
      variants: +pic
    gcc-runtime:
      require: 'target=x86_64_v3 %gcc'
    binutils:
      variants: +ld +gold +headers +libiberty ~nls
    rust:
      require: 'target=x86_64_v3 %gcc' 
    bison:
      require: 'target=x86_64_v3 %gcc'
    raja:
      variants: +plugins
    paraview:
      variants: +qt +examples

    # externals
    mpi:
      require: intel-oneapi-mpi

  specs:
  # CPU Specs:
  - adios
  - adios2
  - alquimia
  - aml
  - amrex
  - arborx
  - argobots
  - ascent
  - axom
  - bolt
  - boost
  - bricks ~cuda
  - butterflypack
  - cabana
  - caliper
  - chai tests=none
  - charliecloud
  - conduit
  - darshan-runtime
  - darshan-util
  - datatransferkit
  - e4s-alc
  - e4s-cl
  - exaworks
  - faodel
  - flecsi
  - flit
  - flux-core
  - fortrilinos
  - gasnet
  - ginkgo
  - globalarrays
  - gmp
  - gotcha
  - gromacs
  - h5bench
  - hdf5
  - hdf5-vol-async
  - hdf5-vol-cache
  - hdf5-vol-log
  - heffte +fftw
  - hpctoolkit
  - hpx networking=mpi
  - hypre
  - kokkos +openmp
  - kokkos-kernels +openmp
  - laghos ^mfem~cuda
  - lammps +amoeba +asphere +bocs +body +bpm +brownian +cg-dna +cg-spica +class2 +colloid +colvars +compress +coreshell +dielectric +diffraction +dipole +dpd-basic +dpd-meso +dpd-react +dpd-smooth +drude +eff +electrode +extra-compute +extra-dump +extra-fix +extra-molecule +extra-pair +fep +granular +interlayer +kspace +lepton +machdyn +manybody +mc +meam +mesont +misc +ml-iap +ml-pod +ml-snap +mofff +molecule +openmp-package +opt +orient +peri +phonon +plugin +poems +qeq +reaction +reaxff +replica +rigid +shock +sph +spin +srd +tally +uef +voronoi +yaff
  - legion
  - libcatalyst
  - libceed
  - libnrm
  - libquo
  - libunwind
  - loki
  - mercury
  - metall
  - mfem
  - mgard +serial +openmp +timing +unstructured ~cuda
  - mpark-variant
  - mpifileutils ~xattr
  - nccmp
  - nekbone +mpi
  - netlib-scalapack
  - nwchem
  - omega-h
  - openfoam
  - openmpi
  - openpmd-api
  - papi target=x86_64_v3
  - papyrus
  - parallel-netcdf
  - parsec ~cuda
  - pdt
  - petsc
  - phist
  - plumed
  - precice
  - pruners-ninja
  - pumi
  - py-h5py
  - py-libensemble
  - py-petsc4py
  - qthreads scheduler=distrib
  - quantum-espresso
  - raja
  - rempi
  - scr
  - slate ~cuda
  - slepc
  - stc
  - strumpack ~slate
  - sundials
  - superlu
  - superlu-dist
  - swig@4.0.2-fortran
  - sz
  - sz3
  - tasmanian
  - tau +mpi +python +syscall
  - trilinos +amesos +amesos2 +anasazi +aztec +belos +boost +epetra +epetraext +ifpack +ifpack2 +intrepid +intrepid2 +isorropia +kokkos +ml +minitensor +muelu +nox +piro +phalanx +rol +rythmos +sacado +stk +shards +shylu +stokhos +stratimikos +teko +tempus +tpetra +trilinoscouplings +zoltan +zoltan2 +superlu-dist gotype=long_long
  - turbine
  - umap
  - umpire
  - unifyfs
  - upcxx
  - variorum
  - veloc
  - vtk-m ~openmp                   # +openmp: https://github.com/spack/spack/issues/31830
  - wannier90
  - xyce +mpi +shared +pymi +pymi_static_tpls
  - zfp

  # SYCL Specs
  - aml +level_zero
  - amrex +sycl
  - arborx +sycl ^kokkos +sycl +openmp cxxstd=17
  - cabana +sycl ^kokkos +sycl +openmp cxxstd=17
  - ginkgo +sycl
  - heffte +sycl
  - hpctoolkit +level_zero
  - kokkos +sycl +openmp cxxstd=17
  - kokkos-kernels ^kokkos +sycl +openmp cxxstd=17
  - sundials +sycl +examples-install cxxstd=17
  - tau +mpi +opencl +python +level_zero +syscall
  - upcxx +level_zero

