spack:
  view: false

  include:
  - ../../.ci/gitlab/
  packages:
    all:
      target: ["x86_64_v3"]
      require:
      - target=x86_64_v3
      - ~cuda
      - ~rocm
    mpi:
      require: openmpi
    python:
      require: "@3.13: target=x86_64_v3"
    py-jaxlib:
      require: "target=x86_64_v3 %c,cxx=clang"
    py-tensorflow:
      require: "target=x86_64_v3 %c,cxx=clang"
    py-torch:
      require: "target=x86_64_v3 %c,cxx=gcc"

  specs:
    # Hugging Face
    - py-transformers

    # JAX
    - py-jax
    - py-jaxlib

    # Keras
    - py-keras backend=tensorflow
    - py-keras backend=jax
    - py-keras backend=torch

    # PyTorch
    - py-botorch
    - py-gpytorch
    - py-kornia
    - py-lightning
    - py-pytorch-lightning
    - py-segmentation-models-pytorch
    - py-timm
    - py-torch
    - py-torch-geometric
    - py-torch-nvidia-apex
    - py-torchaudio
    - py-torchdata
    - py-torchgeo
    - py-torchmetrics
    - py-torchvision
    - py-vector-quantize-pytorch

    # scikit-learn
    - py-scikit-learn

    # TensorBoard
    - py-tensorboard
    - py-tensorboardx

    # TensorFlow
    - py-tensorflow
    - py-tensorflow-datasets
    - py-tensorflow-metadata
    - py-tensorflow-probability

    # XGBoost
    - py-xgboost

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/ubuntu-24.04:v2025-09-15
          entrypoint: ['']

  cdash:
    build-group: Machine Learning
