spack:
  view: false

  include:
  - ../../.ci/gitlab/

  packages:
    all:
      target: [ "x86_64_v3" ]
      require:
      - target=x86_64_v3
      - ~cuda
      - ~rocm
    mpi:
      require: openmpi

  concretizer:
    unify: false
    reuse: false

  specs:
  - ascent  # ^conduit@0.6.0
  - axom
  - blt
  - caliper
  - care  # ~benchmarks ~examples ~tests
  - chai  # ~examples
  - conduit  # ^hdf5+shared
  - flux-core
  # - flux-sched
  - hypre
  - lbann
  # - lvarray@develop ~tests #concretization fails for some reason
  - mfem  # does not work with gcc 7
  - py-hatchet
  - py-maestrowf
  - py-merlin
  - py-shroud
  # - quandary # package needs to specify a version
  - raja # ~examples  # ~tests
  - raja-perf
  - samrai
  - scr
  - sundials
  - umpire # ~openmp
  # - visit   # ^mesa-glu@9.0.0
  - xbraid
  - zfp

  ci:
    pipeline-gen:
    - build-job:
        image:
          name: ghcr.io/spack/ubuntu-24.04:v2024-09-05-v2
          entrypoint: ['']

  cdash:
    build-group: RADIUSS
